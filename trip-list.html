<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    山行届一覧｜ポンコツ倶楽部
  </title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;

      color: #17364d;

      background:
        linear-gradient(
          180deg,
          #dff5ff 0%,
          #eefaff 210px,
          #f8fcff 480px,
          #edf4f8 100%
        );
    }

    button {
      font-family: inherit;
    }

    .header {
      position: relative;
      overflow: hidden;

      padding: 27px 18px 39px;

      color: white;
      text-align: center;

      background:
        linear-gradient(
          145deg,
          #0b5f99 0%,
          #2793c8 55%,
          #8fd9f2 100%
        );
    }

    .header::before {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -30px;

      height: 66px;

      background: #eefaff;

      clip-path: polygon(
        0 72%,
        10% 48%,
        20% 68%,
        31% 28%,
        43% 66%,
        55% 39%,
        67% 72%,
        79% 34%,
        90% 61%,
        100% 40%,
        100% 100%,
        0 100%
      );
    }

    .header h1 {
      position: relative;
      z-index: 1;

      margin: 0;

      font-size: 25px;
    }

    .header p {
      position: relative;
      z-index: 1;

      margin: 6px 0 0;

      font-size: 13px;
      opacity: 0.92;
    }

    .container {
      width: min(
        calc(100% - 24px),
        760px
      );

      margin: 0 auto;
      padding: 18px 0 42px;
    }

    .back-link {
      display: inline-block;

      margin-bottom: 16px;

      color: #176a99;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
    }

    .list-title {
      margin: 0 0 6px;

      color: #173d58;
      font-size: 22px;
    }

    .list-description {
      margin: 0 0 16px;

      color: #6d8798;
      font-size: 13px;
      line-height: 1.6;
    }

    .loading-card,
    .empty-card,
    .error-card {
      padding: 22px 16px;

      border-radius: 16px;

      text-align: center;

      background:
        rgba(
          255,
          255,
          255,
          0.95
        );

      box-shadow:
        0 5px 17px
        rgba(
          34,
          91,
          125,
          0.08
        );
    }

    .loading-card,
    .empty-card {
      color: #67889b;
    }

    .error-card {
      color: #bd3838;
      font-weight: bold;
    }

    .trip-card {
      padding: 16px;

      border:
        1px solid
        rgba(
          87,
          155,
          194,
          0.23
        );

      border-left:
        5px solid
        #2a95c8;

      border-radius: 16px;

      background:
        rgba(
          255,
          255,
          255,
          0.97
        );

      box-shadow:
        0 5px 17px
        rgba(
          34,
          91,
          125,
          0.08
        );
    }

    .trip-card + .trip-card {
      margin-top: 12px;
    }

    .submitted-card {
      border-left-color: #d8a136;
    }

    .approved-card {
      border-left-color: #2a95c8;
    }

    .descended-card {
      border-left-color: #3ca67a;
    }

    .cancelled-card {
      border-left-color: #d05252;

      background:
        rgba(
          255,
          244,
          246,
          0.98
        );
    }

    .trip-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .trip-title {
      margin: 0;

      color: #173d58;
      font-size: 19px;
      line-height: 1.45;
    }

    .status-badge {
      flex-shrink: 0;

      padding: 5px 9px;

      border-radius: 20px;

      font-size: 12px;
      font-weight: bold;
    }

    .status-submitted {
      color: #945f08;
      background: #fff0cf;
    }

    .status-approved {
      color: #176a99;
      background: #e1f2fa;
    }

    .status-descended {
      color: #16714f;
      background: #dff6eb;
    }

    .status-cancelled {
      color: #a33d3d;
      background: #ffe0e0;
    }

    .trip-info {
      margin: 9px 0 0;

      color: #557185;
      font-size: 14px;
      line-height: 1.6;
    }

    .trip-info strong {
      color: #284f69;
    }

    .cancel-message {
      margin-top: 13px;
      padding: 13px;

      border-radius: 12px;

      color: #a33d3d;
      font-size: 16px;
      font-weight: bold;
      text-align: center;

      background: #ffe6e9;
    }

    .detail-button {
      width: 100%;

      margin-top: 14px;
      padding: 11px 10px;

      border:
        1px solid
        #78b8d7;

      border-radius: 10px;

      color: #176a99;
      font-size: 14px;
      font-weight: bold;

      background: white;

      cursor: pointer;
    }

    .force-delete-button {
  width: 100%;

  margin-top: 10px;
  padding: 11px 10px;

  border:
    1px solid
    #e07a7a;

  border-radius: 10px;

  color: #b52f2f;
  font-size: 14px;
  font-weight: bold;

  background: #fff5f5;

  cursor: pointer;
}

    @media (
      max-width: 520px
    ) {
      .trip-title-row {
        display: block;
      }

      .status-badge {
        display: inline-block;
        margin-top: 8px;
      }
    }
  </style>
</head>

<body>

  <header class="header">

    <h1>
      山行届一覧
    </h1>

    <p>
      Trip List
    </p>

  </header>

  <main class="container">

    <a
      class="back-link"
      href="index.html"
    >
      ← ホームへ戻る
    </a>

    <h2
      id="list-title"
      class="list-title"
    >
      山行届一覧
    </h2>

    <p
      id="list-description"
      class="list-description"
    >
      山行情報を読み込んでいます。
    </p>

    <div id="trip-list">

      <div class="loading-card">
        山行届を読み込んでいます...
      </div>

    </div>

  </main>

  <script src="portal-auth.js?v=3"></script>
  <script src="trip-list.js?v=3"></script>

</body>
</html>

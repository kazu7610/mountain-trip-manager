<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    管理者画面｜ポンコツ倶楽部
  </title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;

      color: #17364d;

      background:
        linear-gradient(
          180deg,
          #dff5ff 0%,
          #eefaff 210px,
          #f8fcff 480px,
          #edf4f8 100%
        );
    }

    button {
      font-family: inherit;
    }

    .header {
      position: relative;
      overflow: hidden;

      padding: 27px 18px 39px;

      color: white;
      text-align: center;

      background:
        linear-gradient(
          145deg,
          #0b5f99 0%,
          #2793c8 55%,
          #8fd9f2 100%
        );
    }

    .header::before {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -30px;

      height: 66px;

      background: #eefaff;

      clip-path: polygon(
        0 72%,
        10% 48%,
        20% 68%,
        31% 28%,
        43% 66%,
        55% 39%,
        67% 72%,
        79% 34%,
        90% 61%,
        100% 40%,
        100% 100%,
        0 100%
      );
    }

    .header h1 {
      position: relative;
      z-index: 1;

      margin: 0;

      font-size: 25px;
    }

    .header p {
      position: relative;
      z-index: 1;

      margin: 6px 0 0;

      font-size: 13px;
      opacity: 0.92;
    }

    .container {
      width: min(
        calc(100% - 24px),
        760px
      );

      margin: 0 auto;
      padding: 18px 0 42px;
    }

    .back-link {
      display: inline-block;

      margin-bottom: 16px;

      color: #176a99;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
    }

    .admin-trip-section {
      margin-top: 28px;
    }

    .admin-trip-section:first-child {
      margin-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 9px;

      margin: 6px 2px 13px;

      font-size: 20px;
    }

    .section-title::before {
      content: "";

      width: 5px;
      height: 23px;

      border-radius: 10px;

      background:
        linear-gradient(
          #1282bc,
          #76cfe9
        );
    }

    .section-count {
      margin-left: auto;

      padding: 4px 9px;

      border-radius: 20px;

      color: #176a99;
      font-size: 13px;

      background: #e4f4fb;
    }

    .loading-card,
    .empty-card,
    .error-card {
      padding: 22px 16px;

      border-radius: 16px;

      text-align: center;

      background:
        rgba(
          255,
          255,
          255,
          0.95
        );

      box-shadow:
        0 5px 17px
        rgba(
          34,
          91,
          125,
          0.08
        );
    }

    .loading-card,
    .empty-card {
      color: #67889b;
    }

    .error-card {
      color: #bd3838;
      font-weight: bold;
    }

    .trip-card {
      padding: 16px;

      border:
        1px solid
        rgba(
          87,
          155,
          194,
          0.23
        );

      border-left:
        5px solid
        #2a95c8;

      border-radius: 16px;

      background:
        rgba(
          255,
          255,
          255,
          0.97
        );

      box-shadow:
        0 5px 17px
        rgba(
          34,
          91,
          125,
          0.08
        );
    }

    .trip-card + .trip-card {
      margin-top: 12px;
    }

    .descended-card {
      border-left-color: #3ca67a;
    }

    .change-request-card {
      border-left-color: #d98a2b;

      background:
        rgba(
          255,
          250,
          240,
          0.98
        );
    }

    .cancel-request-card {
      border-left-color: #d05252;

      background:
        rgba(
          255,
          246,
          246,
          0.98
        );
    }

    .trip-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .trip-title {
      margin: 0;

      color: #173d58;
      font-size: 19px;
      line-height: 1.45;
    }

    .status-badge {
      flex-shrink: 0;

      padding: 5px 9px;

      border-radius: 20px;

      color: #996000;
      font-size: 12px;
      font-weight: bold;

      background: #fff0cf;
    }

    .change-request-badge {
      color: #94510a;
      background: #ffe7c2;
    }

    .cancel-request-badge {
      color: #a33d3d;
      background: #ffe0e0;
    }

    .descended-badge {
      color: #16714f;
      background: #dff6eb;
    }

    .trip-info {
      margin: 9px 0 0;

      color: #557185;
      font-size: 14px;
      line-height: 1.6;
    }

    .trip-info strong {
      color: #284f69;
    }

    .request-note {
      margin-top: 12px;
      padding: 12px;

      border-radius: 11px;

      color: #704716;
      font-size: 14px;
      font-weight: bold;
      line-height: 1.6;
      white-space: pre-wrap;

      background: #fff3dc;
    }

    .cancel-note {
      color: #963c3c;
      background: #ffeaea;
    }

    .button-row {
      display: grid;
      grid-template-columns:
        1fr 1fr;

      gap: 9px;

      margin-top: 15px;
    }

    .reject-button,
    .approve-button {
      padding: 11px 8px;

      border-radius: 10px;

      font-size: 14px;
      font-weight: bold;

      cursor: pointer;
    }

    .reject-button {
      border:
        1px solid
        #d79a9a;

      color: #ad3f3f;
      background: white;
    }

    .approve-button {
      border: none;

      color: white;

      background:
        linear-gradient(
          135deg,
          #126da9,
          #2aa8d3
        );
    }

    .approve-button:disabled,
    .reject-button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    @media (
      max-width: 520px
    ) {
      .button-row {
        grid-template-columns: 1fr;
      }

      .trip-title-row {
        display: block;
      }

      .status-badge {
        display: inline-block;
        margin-top: 8px;
      }
    }
    .cancelled-card {
  border-color: #e3a2ab;
  background: #fff4f5;
}

.cancelled-badge {
  color: #a23d4b;
  background: #ffe1e5;
}

.cancelled-message {
  margin-top: 14px;
  padding: 15px 12px;

  border-radius: 12px;

  color: #a23d4b;
  font-size: 18px;
  font-weight: bold;
  text-align: center;

  background: #ffe1e5;
}

.cancelled-complete-button {
  background: #c75b6a;
}

.cancelled-complete-button:hover {
  background: #ad4857;
}

/* 管理者コメント表示 */
.admin-comment-list {
  margin-top: 14px;
}

.admin-comment-item {
  margin-top: 10px;
  padding: 12px;

  border-radius: 11px;

  color: #704716;
  font-size: 14px;
  line-height: 1.6;

  background: #fff3dc;
}

.admin-comment-item strong {
  color: #5d3a16;
}

.admin-comment-time {
  display: block;

  margin-top: 6px;

  color: #6f8798;
  font-size: 12px;
}

.admin-reply-box {
  margin-top: 14px;
  padding: 14px;

  border-radius: 12px;

  background: #f3f9fc;
}

.admin-reply-box strong {
  display: block;

  margin-bottom: 9px;
}

.admin-reply-input {
  width: 100%;
  min-height: 90px;
  padding: 11px;

  border: 1px solid #a9cadc;
  border-radius: 10px;

  color: #17364d;
  font-size: 15px;
  line-height: 1.5;

  background: white;
  resize: vertical;
}

.admin-reply-input:focus {
  outline: none;

  border-color: #2b97c7;

  box-shadow:
    0 0 0 3px
    rgba(43, 151, 199, 0.12);
}

.admin-reply-box .button-row {
  margin-top: 10px;
}

  </style>
</head>

<body>

  <header class="header">

    <h1>
      管理者画面
    </h1>

    <p>
      Trip Approval Management
    </p>

  </header>

  <main class="container">

    <a
      class="back-link"
      href="index.html"
    >
      ← ホームへ戻る
    </a>

    <div id="trip-list">

      <div class="loading-card">
        山行情報を読み込んでいます...
      </div>

    </div>

  </main>

  <script src="portal-auth.js?v=3"></script>
  <script src="admin.js?v=10"></script>

</body>
</html>
